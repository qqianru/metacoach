<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>茹意宝 - 登录</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .login-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 12px 40px rgba(23, 42, 79, 0.08);
    }
    .login-card h1 {
      margin: 0 0 6px;
      font-size: 26px;
    }
    .login-card .subtitle {
      color: var(--muted);
      margin: 0 0 28px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .login-card input {
      border-radius: 12px;
    }
    .login-card button {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      margin-top: 8px;
    }
    .login-card button.secondary {
      margin-top: 10px;
    }
    .error-msg {
      color: #d32f2f;
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }
    .tab-row {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-bottom: 2px solid var(--line);
    }
    .tab-btn {
      flex: 1;
      background: none;
      color: var(--muted);
      border: 0;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      padding: 10px 0;
      cursor: pointer;
      font-weight: 600;
      border-radius: 0;
    }
    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    .register-fields {
      display: none;
    }
    .register-fields.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div style="text-align:center;margin-bottom:16px;">
        <img src="/ruyibao.jpeg" alt="茹意宝" style="height:88px;width:88px;object-fit:cover;border-radius:50%;box-shadow:0 4px 20px rgba(160,120,220,0.35);" />
      </div>
      <h1>茹意宝</h1>
      <p class="subtitle">王鹰教授 AI 学习教练 · 登录以开始</p>

      <div class="tab-row">
        <button class="tab-btn active" id="tabLogin">登录</button>
        <button class="tab-btn" id="tabRegister">注册</button>
      </div>

      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" />
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" />
      </div>

      <div class="register-fields" id="registerFields">
        <div class="form-group">
          <label>注册为</label>
          <div style="display:flex;gap:0;border:1px solid var(--line);border-radius:10px;overflow:hidden;">
            <label style="flex:1;text-align:center;padding:10px;cursor:pointer;background:var(--primary-soft);color:var(--primary);font-weight:600;" id="roleStudentLabel">
              <input type="radio" name="regRole" value="student" checked style="display:none;" /> 学生
            </label>
            <label style="flex:1;text-align:center;padding:10px;cursor:pointer;background:transparent;color:var(--muted);" id="roleParentLabel">
              <input type="radio" name="regRole" value="parent" style="display:none;" /> 家长
            </label>
          </div>
          <div style="font-size:12px;color:var(--muted);margin-top:6px;" id="roleHint">学生账号: 题目陪练 + 错题手术</div>
        </div>
        <div class="form-group">
          <label>显示名称</label>
          <input type="text" id="displayName" placeholder="你的名字（可选）" />
        </div>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <button id="submitBtn">登录</button>
    </div>
  </div>

  <script>
    let isRegister = false;
    let selectedRole = 'student';
    const $ = id => document.getElementById(id);

    // Role selector visual state
    function setRole(role) {
      selectedRole = role;
      const studentLabel = $('roleStudentLabel');
      const parentLabel = $('roleParentLabel');
      if (role === 'student') {
        studentLabel.style.background = 'var(--primary-soft)';
        studentLabel.style.color = 'var(--primary)';
        parentLabel.style.background = 'transparent';
        parentLabel.style.color = 'var(--muted)';
        $('roleHint').textContent = '学生账号: 题目陪练 + 错题手术';
      } else {
        parentLabel.style.background = 'var(--primary-soft)';
        parentLabel.style.color = 'var(--primary)';
        studentLabel.style.background = 'transparent';
        studentLabel.style.color = 'var(--muted)';
        $('roleHint').textContent = '家长账号: 王鹰教授方法 AI 教练';
      }
      // Update hidden radio
      const radios = document.querySelectorAll('input[name="regRole"]');
      radios.forEach(r => r.checked = (r.value === role));
    }

    // If URL has ?role=parent, default to parent registration
    const urlParams = new URLSearchParams(window.location.search);
    const requestedRole = urlParams.get('role');

    $('tabLogin').addEventListener('click', () => {
      isRegister = false;
      $('tabLogin').classList.add('active');
      $('tabRegister').classList.remove('active');
      $('registerFields').classList.remove('show');
      $('submitBtn').textContent = '登录';
      $('errorMsg').style.display = 'none';
    });

    $('tabRegister').addEventListener('click', () => {
      isRegister = true;
      $('tabRegister').classList.add('active');
      $('tabLogin').classList.remove('active');
      $('registerFields').classList.add('show');
      $('submitBtn').textContent = '注册';
      $('errorMsg').style.display = 'none';
    });

    // Wire role selector clicks
    $('roleStudentLabel').addEventListener('click', () => setRole('student'));
    $('roleParentLabel').addEventListener('click', () => setRole('parent'));

    // If arrived with ?role=parent, switch to register tab + parent role
    if (requestedRole === 'parent') {
      $('tabRegister').click();
      setRole('parent');
    }

    function showError(msg) {
      $('errorMsg').textContent = msg;
      $('errorMsg').style.display = 'block';
    }

    function redirectByRole(role) {
      if (role === 'parent') window.location.href = '/parents/';
      else if (role === 'teacher') window.location.href = '/admin.html';
      else window.location.href = '/';
    }

    $('submitBtn').addEventListener('click', async () => {
      const username = $('username').value.trim();
      const password = $('password').value.trim();
      if (!username || !password) return showError('请填写用户名和密码');

      let url;
      if (isRegister) {
        url = (selectedRole === 'parent') ? '/api/auth/register/parent' : '/api/auth/register';
      } else {
        url = '/api/auth/login';
      }
      const body = { username, password };
      if (isRegister) body.displayName = $('displayName').value.trim();

      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (data.error) return showError(data.error);
        localStorage.setItem('mc_user', JSON.stringify(data.user));
        redirectByRole(data.user.role);
      } catch (err) {
        showError('网络错误，请重试');
      }
    });

    ['username', 'password', 'displayName'].forEach(id => {
      const el = $(id);
      if (el) el.addEventListener('keydown', e => { if (e.key === 'Enter') $('submitBtn').click(); });
    });

    // If already logged in, go to role-appropriate home
    try {
      const u = JSON.parse(localStorage.getItem('mc_user'));
      if (u && u.id && u.id !== 'guest') redirectByRole(u.role);
    } catch {}
  </script>
</body>
</html>
