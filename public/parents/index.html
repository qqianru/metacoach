<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>茹意宝 · 家长教练</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/parents.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px;">
          <img src="/ruyibao.jpeg" alt="茹意宝" style="height:64px;width:64px;object-fit:cover;border-radius:50%;box-shadow:0 2px 12px rgba(160,120,220,0.4);" />
          <div>
            <h1>茹意宝 · 家长教练</h1>
            <p>不是给孩子诊断，是帮你今晚先稳住自己。</p>
          </div>
        </div>
        <div class="user-bar">
          <span id="userDisplay" style="font-size:13px;color:var(--muted);"></span>
          <a href="/parents/history.html" id="historyLink" style="font-size:13px;display:none;">我的会话</a>
          <button class="secondary" id="logoutBtn" style="font-size:12px;padding:6px 10px;">退出</button>
        </div>
      </header>

      <section class="parent-intro">
        <h2>👋 你今晚遇到什么情况？</h2>
        <p>下面是十个最常见的家庭场景。点一张和你的情况最像的卡片，教练会用王鹰教授的方法，给你今晚就能做的具体动作。</p>
      </section>

      <section class="scenario-grid" id="scenarioGrid">
        <!-- 由 JS 动态填充 -->
        <div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:60px 0;">载入中...</div>
      </section>

      <section class="parent-fallback">
        <h3>🆓 都不像？直接告诉教练你的情况</h3>
        <textarea id="customQuestion" rows="4" placeholder="例：我女儿初三，最近一周总说胃疼但医院查不出问题，她爸觉得是装病，我也不知道该怎么办……"></textarea>
        <button id="customStartBtn" class="primary-btn">开始和教练对话 →</button>
      </section>
    </div>

    <script>
      // ---- Auth check ----
      let mcUser = null;
      try { mcUser = JSON.parse(localStorage.getItem('mc_user')); } catch {}
      if (!mcUser || !mcUser.id) {
        window.location.href = '/login.html?role=parent';
      }
      if (mcUser && mcUser.role !== 'parent') {
        // 已经登录但是不是家长账号 — 重定向到学生 app 或登录页
        if (mcUser.role === 'student') window.location.href = '/';
        else if (mcUser.role === 'teacher') window.location.href = '/admin.html';
      }

      document.getElementById('userDisplay').textContent = mcUser ? mcUser.displayName : '';
      document.getElementById('historyLink').style.display = 'inline';
      document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('mc_user');
        window.location.href = '/login.html';
      });

      // ---- Load 10 scenario cards ----
      async function loadScenarios() {
        try {
          const r = await fetch('/api/parents/scenarios');
          const data = await r.json();
          const grid = document.getElementById('scenarioGrid');
          grid.innerHTML = '';
          for (const s of data.scenarios) {
            const card = document.createElement('div');
            card.className = 'scenario-card';
            card.innerHTML = `
              <div class="card-tag">${escapeHtml(s.subjectTag)}</div>
              <div class="card-parent-state">${escapeHtml(s.parentState)}</div>
              <div class="card-kid-quote">${escapeHtml(s.kidQuote)}</div>
              <div class="card-cta">→ 看教练怎么处理</div>
            `;
            card.addEventListener('click', () => startSession(s.id));
            grid.appendChild(card);
          }
        } catch (e) {
          console.error(e);
          document.getElementById('scenarioGrid').innerHTML =
            '<div style="grid-column:1/-1;color:#c33;text-align:center;">载入失败，请刷新</div>';
        }
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
      }

      // ---- Start a session (either from card or from custom input) ----
      async function startSession(scenarioId) {
        try {
          const r = await fetch('/api/parents/session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-user-id': mcUser.id },
            body: JSON.stringify({ scenarioId: scenarioId || null })
          });
          const data = await r.json();
          if (data.error) {
            alert('启动失败: ' + data.error);
            return;
          }
          // 跳到聊天页
          window.location.href = '/parents/chat.html?id=' + data.conversationId;
        } catch (e) {
          alert('网络错误,请稍后再试');
        }
      }

      document.getElementById('customStartBtn').addEventListener('click', async () => {
        const text = document.getElementById('customQuestion').value.trim();
        if (!text) {
          alert('请先描述一下你的情况');
          return;
        }
        // 创建空会话,然后跳到聊天页带上 firstMessage 参数
        try {
          const r = await fetch('/api/parents/session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-user-id': mcUser.id },
            body: JSON.stringify({})  // 不带 scenarioId
          });
          const data = await r.json();
          if (data.error) {
            alert('启动失败: ' + data.error);
            return;
          }
          // 把家长第一条消息暂存,聊天页会自动发送
          sessionStorage.setItem('parents_pending_first_msg', text);
          window.location.href = '/parents/chat.html?id=' + data.conversationId;
        } catch (e) {
          alert('网络错误,请稍后再试');
        }
      });

      loadScenarios();
    </script>
  </body>
</html>
